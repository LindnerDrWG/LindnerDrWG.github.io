##| F - distribution  with Eigenmath    - Ch. 3.4 of 
##| book https://lindnerdrwg.github.io/Statistics-with-Eigenmath.pdf
##|      by Dr. W.G. Lindner, Leichlingen DE, 2025

-- REMARK
-- To implement fPDF distribution we need Beta-function as helper.
-- Beta function B, noted as \Beta, i.e. greek capital B.

   Beta(a,b) = test( or(a<=0, b<=0), -1,    -- or NaN
                    tgamma(a)*tgamma(b)/tgamma(a+b))    
                    --or: exp( lgamma(a)+lgamma(b)-lgamma(a+b)) )

"--- 1. --- check Beta()"

Beta(1,3)

-- cf. MATLAB: https://de.mathworks.com/help/matlab/ref/beta.html
-- B = beta((1:5)',3)
-- B = 1/3  1/12  1/30   1/60   1/105   


# DEFINITION 
"============================== fPDF -  F probability density"

  fPDF(x,f1,f2) = float( sqrt(((f1*x)^f1*f2^f2)/(f1*x+f2)^(f1+f2)) /
                         (x*Beta(f1/2,f2/2)) )

------------------------------------------------------------
-- F-distribution with two 'degrees of freedom' f1, f2
-- cf. [6] p.57

fPDF(1.2, 10, 20)

"--- 2. ---"

fPDF(1,1,1)

fPDF(1,100,100)

X     = ("x:",1,2,3,4,5,6)
Fp(x) = fPDF(x,2,2)
FP    = ("fPDF(x,2,2):",Fp(1),Fp(2),Fp(3),Fp(4),Fp(5),Fp(6))
ML = ("MatLab:",0.2500,  0.1111,  0.0625,  0.0400,  0.0278,  0.0204)
(X,FP,ML)
"ok"

-- Check w MATLAB
--       y = fpdf(1:6,2,2)
--       y = 0.2500  0.1111  0.0625  0.0400  0.0278  0.0204

"                     F PDF distrobution for f1=2 f2=2"
f = fPDF(x,2,2)
xrange = (0,6)
yrange = (0,1)
draw(f,x)
 


# DEFINITION
"============================== fCDF -  F cumulative distribution"
  
  fCDF(t, df1, df2) = fdist(t, df1, df2)

  fCDF1(t,df1,df2)  = incbeta(t/(t+df2/df1), 0.5 df1, 0.5 df2)

-----------------------------------------------------------------
-- REMARK
-- df1, df2 : degree of freedom
-- real t is in the range [0,1]
-- The inputs df1 and df2 must be real and strictly positive (>0).

-- fCDF  use build-in function fdist().
-- fCDF1 use build-in function incbeta.
-- The source code of fCDF is in Appendix I, see below -1.-

"--- 3. ---  fCDF table"

fCDF(1.5, 10, 20)

-- EXAMPLE
X     = ("x:",2,3,4,5,6)
Fc(x) = fCDF(x,2,6)
FC    = ("fCDF(x,2,6):", Fc(2), Fc(3), Fc(4), Fc(5), Fc(6))
ML    = ("MatLab:", 0.7840, 0.8750, 0.9213, 0.9473, 0.9630)
(X,FC,ML)
"ok"

-- CHECK: 
-- octave:1> pkg load statistics 
--           x  = 2:6;
--           fcdf(x,2,6)
--         > 0.7840   0.8750   0.9213   0.9473   0.9630



# DEFINITION
"============================== fINV - F inverse cumulative"

fINV(x,df1,df2, a,b,k,t,y) = do(
           a = -10.0, b = 10.0,
           for(k,1,100,  t = (a + b) / 2,
                         y = fCDF(t,df1,df2),
                         test(abs(x - y) < 0.000001, break, 
                              y < x, a = t, b = t)),  t)  
-------------------------------------------------------------- END
-- REMARK
-- works only if f1>6 & f2>4 
-- fINV is the quantile of fCDF().
-- implementation of the inverse cumulative F-distribution
-- proposed by G. Weigt along qt() source of R

"--- 4. --- WARNING: f1>6 & f2>4 must be!"

"fINV(0.95, 8, 1) = wrong value w.r.t. R: 238.88"   
fINV(0.95,8,1)   -- ~ok, see remark: f2 < 4 !
                 -- R> qf(0.95,8,1)           [1]   238.8827
                 -- octave:1> finv(0.95,8,1)  ans = 238.88

"fINV(0.95, 8, 10) ="   
fINV(0.95,8,10)   -- ok, Spiegel: 293
                  -- R>  qf(0.95,8,10)  [1] 3.071658,  f1<6 ?!
"ok"

"fINV(0.6, 2, 9) =" 
fINV(0.6,2,9)     -- Bognar: 0.5409  also bad
                  -- R>  qf(0.6,2,9)             [1]   1.016246
                  -- octave:12> finv(0.6, 2, 9)  ans = 1.0162
"ok"

fINV(0.95, 4, 5)  -- ok

"--- 5. --- fINV table"

-- EXAMPLE
X     = ("x:",0.25, 0.5, 0.75, 0.999)
Fi(x) = fINV(x,10,20)
FI    = ("fINV(x,10,20):", Fi(0.25), Fi(0.5), Fi(0.75), Fi(0.999))
R     = ("R:", 0.6564, 0.9662, 1.3994, 5.075246)
ML    = ("Octave:", 0.6564,   0.9663,   1.3995,   5.0752)
(X,FI,R,ML)
"ok"

-- CHECK: 
-- octave:1> pkg load statistics 
-- octave:2> X     = [0.25, 0.5, 0.75, 0.999]
-- octave:3> finv(X,10,20)
--            ans = 0.6564   0.9663   1.3995   5.0752


"                     F quantile function for f1=10 f2=20"
xrange = (0,1)
yrange = (0,5)
draw(fINV(x,10,20))
