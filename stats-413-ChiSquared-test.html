##| PEARSON's Chisq test  with Eigenmath    - Ch. 4.13 of 
##| book https://lindnerdrwg.github.io/Statistics-with-Eigenmath.pdf
##|      by Dr. W.G. Lindner, Leichlingen DE, 2025
 
--..................... Prerequisites: GammaP, chi2CDF, chi2INV
  GammaP(x,k)   = x^k*exp(-x) * sum(m,0,100, x^m/tgamma(k+m+1))

  chi2CDF(x, k) =  test( or(x<=0,k<=0), 0,
                   float(GammaP(x*0.5, k*0.5 )) )

  chi2INV(x,alp, a,b,k,t,y) = do(
           a = -30.0, b = 30.0, 
           for(k,1,100,  t = (a + b) / 2,
                         y = chi2CDF(t,alp),
                         test(abs(x - y) < 0.000001, break, 
                              y < x, a = t, b = t)),  t) 
--......................................................... END


###########################################
"--- 1. --- EXAMPLE: vitamin C prophylaxis"
###########################################

-- EXAMPLE (HERRMAN, cf. [6], p.159 ff)
-- Studies by the physician {\sc G. Ritzel} from 1961, who tested the
-- influence of vitamin C on cold prophylaxis on skier in a 
-- double-blind, randomized experiment, was given in the following
-- four-field 'contingency table' table. 
--              Cold  no.cold 
--           C:[  17  122]
--     placebo:[  31  109]

-- Check Ho: Pr[cold] = Pr[nocold] for a 5% probability 
-- of significance.

-- SOLUTION in the following steps:

    do(a=17, b=122, c=31 , d=109)   -- the data of the table

    n   = a+b+c+d
    n

    z   = mag(a*d-b*c) - 0.5*n
    z                -- with YATES correction -0.5*n

    chi = z*z*n/((a+b)*(c+d)*(a+c)*(b+d))
    chi

    p   =  1 - chi2CDF(chi,1)    -- p-value nach R
    p                            -- Herrmann: p=1-.. ?

    phi = sqrt(chi/n)            -- contingency coefficient

    print("Summary: Chi - p - phi:")
    (chi, p, phi)                -- test statistics

-- pval = 1 - chi2CDF(chi, 1)    
-- p    = 1 - chi2INV(1-0.05/2, 1)



"--- 2. --- abstract the process to function 'chisqTest'"

######################################## cf. C code in [6, p.160]
###   chisqTest(a,b,c,d)
##
###   input: a,b, c,d integer valued, 
##           A,B, C,D features watched,
##    table              C  D 
##                    A:[a  b]
##                    B:[c  d]
##
################################################# fourfields test
chisqTest(a,b,c,d,  n,z,chi,p,phi) =
do( test( or(a<=0, b<=0, c<=0, d<=0), "Error"), --test(n<2, break),
    n   = a+b+c+d,
    z   = mag(a*d-b*c) - 0.5*n,   -- with YATES correction
    chi = z*z*n/((a+b)*(c+d)*(a+c)*(b+d)),
    p   = 1 - chi2CDF(chi,1),
    phi = sqrt(chi/n),            -- contingency coefficient
    print(" _____ ChiSquared test ____"),
    (("Chi", "p", "phi"), (chi, p, phi)) ) -- test statistics
-------------------------------------------------------------- END

-- REMARK:
-- good approximation, if n=a+b+c+d > 40 and a,b,c,d > 5.
-- chi^2 ~ chi(df=1).


"--- 3. --- Cold vs. no Cold"

-- EXAMPLE:
--             Cold  no Cold
--  Vitamin C:[17    122   ]
--  Placebo  :[31    109   ]
--
-- SOLUTION:

n = 17+122+ 31+109
n
chisqTest(17,122, 31,109)

-- DECISION:
-- With a 5% probability of error, independence can just be rejected.

"--- 4. ---  EXAMPLE: red-green color blindness"

-- cf. Herrmann, p.161
-- In a red-green color blindness study, the following four-field 
-- table was obtained. 
--                    male   female
--  normal          :[8324    9031]
--  red-green-blind :[ 725      40]
--
-- Check via a chi-squared test statistic for the dependence of 
-- blindness on gender.

-- SOLUTION:

chisqTest(8324, 9031, 725, 40)
"ok"

-- DECISION:
-- The Chi^2 test statistic is 640.3.
-- The associated p-value p of the Chi^2 distribution is 1.
-- With a 5% probability of error, the independence of red-green 
-- color blindness of the gender can just be rejected.
