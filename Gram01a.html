# EIGENMATH 
GramSchmidt2(v)= do( 
    u=zero(2,2),          -- u = ((0,0),(0,0))
    u[1] = v[1],
    u[2] = v[2] - inner(u[1],v[2]) / inner(u[1],u[1])*u[1],
    u)

# TEST EXAMPLE
B = ((1,2),               -- v1 = (1,2)
     (3,4))               -- v2 = (3,4)
GramSchmidt2(B)           -- = u
