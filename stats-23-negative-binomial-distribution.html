# DEFINITON
"============================== nbinPDF -  neg.binomial.density"

     nbinPDF(x,r,p) = choose(x+r-1,x)*p^r*(1-p)^x

------------------------------------------------------------
-- where
-- r >0        : number of successes until stop
-- k = 0,1,2,..: number of failures       
-- p in [0,1]  : success probability in each experiment
--               k failures, given r successes.

-- nbinPDF(x,r,p) returns the negative binomial pdf at the 
-- value in x using the corresponding number r of successes
-- and probability p of success in a single trial.
-- cf. MATLAB> https://de.mathworks.com/help/stats/nbinpdf.html

-- REMARK
-- from EigenMath version >= 3.42 you may code
------------------------------------------------------------

   nbinPDF1(x,r,p) = tgamma(r+x)/(tgamma(r) * tgamma(x+1)) *
                     (1-p)^x*p^r
------------------------------------------------------------

"--- 1. ---"

nbinPDF(5,10,0.4)    
nbinPDF(10,5,0.25)  
nbinPDF(3,68,0.95)
"ok"

"-1a.-"

nbinPDF1(5,10,0.4)    -- ok, 0.1632
nbinPDF1(10,5,0.25)   
nbinPDF1(3,68,0.95)   -- ok, 0,2091

-- for(x,0,5, print((x,float(nbinPDF(x,10,0.4)))) )  -- List of values


"--- 2. ---"

-- EXAMPLE: https://de.mathworks.com/help/stats/nbinpdf.html
"                       table of nbinPDF(x, 3, 0.5)"
T = zero(2,11)
for(i,1,11, T[1,i] = i-1)
for(i,1,11, T[2,i] = float(nbinPDF(i-1,3,0.5)))
transpose(T)

"                       plot of nbinPDF/1(x, 3, 0.5)"
f = nbinPDF(x,3,0.5)    -- discrete plot due to choose() (integer)
xrange = (0,10)
yrange = (0,0.3)
draw(f,x)

f = nbinPDF1(x,3,0.5)  -- continous plot due to tgamma (real)
xrange = (0,10)
yrange = (0,0.3)
draw(f,x)

"--- 3. --- WIKIPEDIA"

-- Notation:     X ~ NB(r,p) 
-- https://en.wikipedia.org/wiki/Negative_binomial_distribution
-- r >0        : number of successes until stop
-- k = 0,1,2,..: number of failures       
-- p in [0,1]  : success probability in each experiment
--               k failures, given r successes.

"     3.a candy problem"
-- EXAMPLE (Selling candy)
-- Pat Collis is required to sell candy bars to raise money for the 
-- 6th grade field trip. Pat is (somewhat harshly) not supposed to 
-- return home until five candy bars have been sold. So the child goes 
-- door to door, selling candy bars. At each house, there is a 0.6 
-- probability of selling one candy bar and a 0.4 probability of 
-- selling nothing.
-- What's the probability of selling the last candy bar at 
-- the n-th house?

-- SOLUTION:
-- The number of trials (i.e. houses) this takes is therefore k+5=n.
-- What we are interested in is the number of houses, 
-- so we substitute k = n − 5 into a NB(5, 0.4) mass function

nbinPDF(10-5,5,0.4)         -- ok, 0.100329, n=10, k=n-5, f(n)

"     3b. "
-- What's the probability that Pat finishes on or before 
-- reaching the eighth house?

f(n) = choose((n-5)+5-1, n-5)*(1-0.4)^5*0.4^(n-5)
f(5)
f(6)
f(7)
f(8)

sum(i,5,8, f(i))

"     3c. "
-- What's the probability that Pat exhausts all 30 houses 
-- that happen to stand in the neighborhood?

finist5to30 = 1 - sum(j,5,30, f(j))
finist5to30 -- ok


# DEFINITON
"================================== nbinCDF - cumulative nbin" 

   nbinCDF(x,r,p) = p^r*sum(j,0, floor(x), choose(r+j-1,r-1)*(1-p)^j)

--------------------------------------------------------------
-- for x>= 0 failures, else 0
-- cf. https://de.mathworks.com/help/stats/nbincdf.html
-- REMARK
-- The nbinCDF function calculates the probability of a given number 
-- of failures (x) before the number of successes specified by (r)
-- is reached. The probability_success argument p determines the 
-- constant probability of success.


nbinCDF(1,2,0.5) -- = 0.5 ok

"--- 4. ---"

-- EXAMPLE: https://de.mathworks.com/help/stats/nbinpdf.html
"                       table of nbinCDF(x,3,0.5)"
T = zero(2,11)
for(i,1,11, T[1,i] = i-1)
for(i,1,11, T[2,i] = float(nbinCDF(i-1,3,0.5)))
transpose(T)


"                      stairs plot of nbinCDF(x,3,0.5)"
-- f = nbinCDF(x,3,0.5)    -- discrete plot due to choose (integer)
xrange = (0,10)
yrange = (0,1)
draw(nbinCDF(x,3,0.5),x)

"--- 5. --- EXAMPLE: identify five people"

-- EXAMPLE: (EXCEL)
-- You are asked to identify five people who have excellent reflexes,
-- and you know the probability that any one candidate meets this 
-- requirement is 0.25. nbinCDF (=NEGBINOM.DIST) calculates the 
-- probability that you will interview a certain number of unsuitable
-- candidates before identifying five suitable candidates.

-- cf.: https://support.microsoft.com/de-de/office/negbinom-vert-funktion-c8239f89-c2d0-45bd-b6af-172e570f8599

-- SOLUTION:

nbinCDF(10, 5, 0.25)
"ok"

-- R> pnbinom(10, 5, 0.25)
--      [1] 0.3135141


# DEFINITON
"============================ nbinINV - neg.binom.quantile" 

   nbinINV(alpha,r,p, x,k) = 
      do( k=0,
          loop(k = k+1, 
               x = nbinCDF(k,r,p), 
               x,k, test(x>alpha, break)), x,k)

---------------------------------------------------------
-- This function is used to find the n.th quantile, 
-- that is if P(X <= k) is given, it finds k.

-- nbinINV(alpha, r, p) in R: qnbinom(alpha, size, prob) where
-- alpha: The probability for which to find the quantile 
--       (e.g., 0.95 for the 95th percentile).
-- size: The target number of successes 
--       (r in some parameterizations).
-- prob: The probability of success on each trial 
--       (p in some parameterizations).

-- Interpretation:
-- nbinINV(alpha, size, prob) returns the number of trials 
-- (or failures before the size-th success) such that the probability
-- of observing that many or fewer failures is at least p.

"--- 6. ---"

nbinINV(0.99, 5, 0.25)

nbinINV(0.95, 10, 0.7)
"ok"

-- CHECK
-- R> qnbinom (0.95, size = 10, prob = 0.7)
--    [1] 9

nbinINV(0.75,3,0.5)

-- This code will output the number of trials 
-- (including successes with a success probability of 0.7)
-- where the probability of getting 10 or fewer failures is at least
-- 95%. You can then subtract 10 to find the number of failures.

"--- 7. --- EXAMPLE: flip a fair coin"

-- EXAMPLE(MATLAB) https://de.mathworks.com/help/stats/nbininv.html
-- How many times would you need to flip a fair coin to have a 99% 
-- probability of having observed 10 heads?

nbinINV(0.99, 10, 0.5)
"ok"
