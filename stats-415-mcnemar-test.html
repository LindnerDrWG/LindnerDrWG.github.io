##| McNEMAR TEST   with Eigenmath    - Ch. 4.15 of 
##| book https://lindnerdrwg.github.io/Statistics-with-Eigenmath.pdf
##|      by Dr. W.G. Lindner, Leichlingen DE, 2025


--.............. The McNEMAR test needs the Chi.square distribution

  GammaP(x,k)    = x^k*exp(-x) * sum(m,0,100, x^m/tgamma(k+m+1))

  chi2CDF(x, k)  =  test( or(x<=0,k<=0), 0,
                    float(GammaP(x*0.5, k*0.5 )) )

  binoCDF(k,n,p) = sum(j,0,floor(k), choose(n,j)*p^j*(1-p)^(n-j) )
--............................................................ END


### --------------------------------------------------------------
   "--- 1. --- difficulty of exam problems"
### EXAMPLE: McNemar test, Herrmann [6, p. 163]
### --------------------------------------------------------------

-- We check he null hypothesis of the equal difficulty of the 
-- two problems A and B w.r.t the splitted contingency table  
--
--          A\B  +    -
--           +: [63   20] a+b = 83
--           -: [11    6] c+d = 17
--               74   26
--               a+c  b+d

-- SOLUTION step-by-step

X = ((63, 20),(11, 6))
X

do( a = X[1,1],  b = X[1,2], c = X[2,1], d = X[2,2] )
b
b+c

n    = a+b+c+d
n

yates = test( or(b+c<=30 , n<=40), 1, 0)
yates

z    = mag(b-c) - yates
z

chi  = z*z/(b+c)             -- test statistics chi
chi = float(chi)             -- nach wiki/R
"ok"

critVal = chi2CDF(chi,1)      -- critical value at chi
critVal
"ok"

p    = 1 - chi2CDF(chi,1)     -- p value; Herrman: p=chi.. ?
p

h = test(p < 0.05, 0,1)       -- 0: reject Ho
h                             -- 1: accept Ho

(("chi",  "Ho",  "p"),(chi, h, p )) 

-- Result: The null hypothesis h of the equal difficulty of the 
-- problems can be rejected only with 11.2 % of error.
"ok  w.r.t Herrmann"


"--- 2. --- abstract the procedure above to the function"


### ------------------- McNEMAR test ----------------------
###     mcnemarTest(a,b,c,d,method)
###            method = "asymptotic", "corrected", "exact"
### .......................................................

mcnemarTest(a,b,c,d,method,  n,chi,h,p) = 
     do(     -- default = "asymptotic"
       test( or(a<=0, b<=0, c<=0, d<=0), "Error"), 
       n    = a+b+c+d,
       test(method = "asymptotic",
              do( chi = float((b-c)^2 / (b+c)),
                  p   = 1-chi2CDF(chi, 1) ),
            method="corrected",     -- YATES correction
              do( chi = float((mag(b-c)-1)^2 / (b+c)),
                  p   = 1-chi2CDF(chi, 1)),
            method="exact", p = 2*(binoCDF(b, b + c, 0.5))),
       Ho = test(p < 0.05, 0,1),    -- HORNIK
       print(" ____ McNEMAR ____"),
      (("chi", "p", "Ho"), (chi, p, Ho )))  
      -- in 3rd case there is no chi --> $arg7 :)
 
### ----------------------------------------------------- END

-- REMARK
-- See the implementation of mcnemarTest in
--     https://en.wikipedia.org/wiki/McNemar%27s_test
-- The smaller the value of p, the greater the evidence for 
-- rejecting the null hypothesis

-- REMARK: see wiki, ibid.: Python code excerpt

-- Check of Example 1
X = (63, 20,  11, 6)
mcnemarTest(X[1], X[2],  X[3], X[4], "asymptotic")
mcnemarTest(X[1], X[2],  X[3], X[4], "corrected")
mcnemarTest(X[1], X[2],  X[3], X[4], "exact")
"ok"
