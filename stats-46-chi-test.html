##| Chi-squaread Test  with Eigenmath    - Ch. 4.6 of 
##| book https://lindnerdrwg.github.io/Statistics-with-Eigenmath.pdf
##|      by Dr. W.G. Lindner, Leichlingen DE, 2025


--- 0. --- Prerequisites: mean, sd, min, chi^2 ..

mean(X)  = sum(X)/dim(X)
sd(X)    = sqrt(sum((X-mean(X))^2) /(dim(X)-1.))
min(a,b) = test(a<=b, a,b)

-- To calculate the t-TEST score 'T' we need the functions
-- chi2CDF() and ch2INV() from Chi-distribution.txt as helper: 

--.................................................... chiCDF/INV

  GammaP(x,k) = x^k*exp(-x) * sum(m,0,100, x^m/tgamma(k+m+1))

  chi2CDF(x, k) =  test( or(x<=0,k<=0), 0,
                   float(GammaP(x*0.5, k*0.5 )) )

  chi2INV(x,alp, a,b,k,t,y) = do(
           a = -30.0, b = 30.0, 
           for(k,1,100,  t = (a + b) / 2,
                         y = chi2CDF(t,alp),
                         test(abs(x - y) < 0.000001, break, 
                              y < x, a = t, b = t) ),  t)
--..................................................... END


#################################################
"--- 1. ---  EXAMPLE: The size of PREY"
#################################################

-- EXAMPLE
-- We use FOLEY's example in>  https://rpubs.com/mpfoley73/460916 .
-- The size of prey (millimeters) of two species of net-casting 
-- spiders, deinopis (X) and menneus (Y) are sampled for 10 spiders 
-- each species. What is the difference in the mean size of the prey 
-- of the two species? The null hypothesis is the assumption of the 
-- same variance with a 5% probability of error.
-- SOLUTION:

X = (12.43,11.71,14.41,11.05,9.53, 11.66, 9.33, 11.71, 14.35, 13.81)

"--- a.  We do the calculation STEP-BY-STEP to show the procedure."

sigma0 = 1     -- hypothesized standard deviation 
alpha  = 0.05  -- significance level of rejecting the null hypothesis

n = dim(X)
n

Xbar = mean(X)          -- not needed
Xbar

s = sd(X)
s

variance = s^2          -- not needed
variance

df = n-1                -- degrees of freedom
df

T = (n-1)*s*s/(sigma0*sigma0)    -- test statistic
T

pValue = min( 2*chi2CDF(T,df), 2*(1-chi2CDF(T,df)) )
pValue

# find Chi-Square critical value
critValue = chi2INV(1-.05, df)    -- 'lower.tail=FALSE'
critValue

-- NOTE
-- lower.tail: If TRUE, the probability to the left of p in the F 
-- distribution is returned. R:  Default is TRUE.
-- If FALSE, the probability to the right is returned. 
-- If the test statistic T is greater than 16.9189, then the results 
-- of the test are statistically significant.
-- Note that smaller values of alpha will lead to larger Chi-Square 
-- critical values. 

test(pValue < 0.975, "accept H0", "reject H0")
"ok"

ucl = (n-1)*s^2/ chi2INV(alpha/2, df)      
ucl

lcl = (n-1)*s^2/ chi2INV(1-alpha/2, df) 
lcl

CI =(lcl, ucl)              -- confidence intervall
CI


"--- b.  abstract above procedure to functon VARTEST()"
### --------------------------------------------------------------
###  vartest(X, alpha, sigma0)
### --------------------------------------------------------------

vartest(X, alpha, sigma0,  T,p,df) = do(
      print("..... Stats result of CHI^2 variance test:"),
      n  = dim(X),  
      df = n-1,
      -- Xbar = mean(X),
      s = sd(X),
      -- variance = s^2
      T = (n-1)*s*s/(sigma0*sigma0),
      p = min( 2*chi2CDF(T,df), 2*(1-chi2CDF(T,df))),
      CI= ( (n-1)*s^2/ chi2INV(1-alpha/2,df),      -- LCL
            (n-1)*s^2/ chi2INV(  alpha/2,df) ),    -- UCL
      test(p < alpha, print("..... reject H0"), 
                      print("..... accept H0")),
      print(" __________ vartest _________"),
      ("var, T=chi2, p, alpha, LCL, UCL:",s^2,T,p,alpha,CI[1],CI[2]) )

### -------------------------------------------------- END vartest

-- Check:

vartest(X, 0.05, 1)
"ok"

-- RESULT: 
-- The p-value = 0.001196 < alpha=0.05, 
-- so reject H0 that s^2 = sigma0^2.
