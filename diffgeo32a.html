# EIGENMATH
phi(u,v) = (u,v, u^2+v^2)

-- coefficients of surface metric tensor
E = 1 + 4u^2
F = 4 u v
G = 1 + 4v^2

-- coefficients of 2nd fundamental tensor
L = 2(4u^2+4v^2+1)^(-1/2)
M = 0
N = 2(4u^2+4v^2+1)^(-1/2)

-- shape operator
A = dot( inv(((E,F),(F,G))) , ((L,M),(M,N)) )
K = det(A)
H = contract(A)

</textarea>
