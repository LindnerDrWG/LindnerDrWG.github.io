<table><tr><td>
<textarea id="stdin" rows="24" cols="80" style="font-family:courier;font-size:12pt">

# EIGENMATH
"GAUSS and mean curvature of HELICOID"
-- coefficients of fff
E =1
F = 0
G = v^2+1

-- coefficients of sff
L = 0
M = (v^2+1)^(-1/2)
N = 0

-- shape operator via (5.2)
A = dot( inv(((E,F),(F,G))) , ((L,M),(M,N)) )
A                                 --(0)

"GAUSS curvature via (6.1)"
K = det(A)
K                                 --(1)

"mean curvature via (6.2)"
H = contract(A)
H                                 --(2)

"principal curvature via (6.3)"
det(A - lambda unit(2))           --(3)

lambda1 = 1/(v^2+1)               --(4)
lambda1
lambda2 = -1/(v^2+1)
lambda2

"K and H and lambda at p=(1,1)"
--           p:1    1
Ap = eval(A, u,1, v,1)       --(5)
Ap

Kp = det(Ap)                 --(6)
Kp

Hp = contract(Ap)            --(7)
Hp

lambda1p = eval(lambda1, u,1, v,1)  -- (8)
lambda1p
lambda2p = eval(lambda2, u,1, v,1)
lambda2p

</textarea>
</td><td>
<button onclick="run()" style="font-size:20pt">Run</button>
