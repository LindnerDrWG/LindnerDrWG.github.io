<textarea id="stdin" rows="24" cols="80" style="font-family:courier;font-size:12pt">
# EIGENMATH
Curl(F) = do(
     Cx = d(F[3],y)-d(F[2],z),
     Cy = d(F[1],z)-d(F[3],x),
     Cz = d(F[2],x)-d(F[1],y),
     C  = (Cx,Cy,Cz),
     C)

F = (x*y,-sin(z),1)    -- example vector field [Marsden, p.917]

Curl(F)     -- testing the definition
curl(F)     -- check against build-in curl

</textarea>
</td><td>
